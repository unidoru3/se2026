<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div class="max-w-md mx-auto p-4 md:py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-600">📝 ToDo List</h1>
            <button onclick="deleteCompleted()" class="text-xs bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1.5 rounded-lg transition">
                <i class="fa-solid fa-trash-can mr-1"></i> 完了を一括削除
            </button>
        </div>

        <form id="todo-form" onsubmit="addTodo(event)" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6">
            <input type="text" id="todo-title" placeholder="新しいタスクを入力..." required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm mb-3">
            <div class="flex items-center justify-between gap-2">
                <div class="flex items-center gap-1 text-xs text-gray-500">
                    <i class="fa-regular fa-calendar-days"></i> 締め切り:
                    <input type="date" id="todo-date" class="border rounded px-1.5 py-0.5 focus:outline-none text-gray-700">
                </div>
                <label class="flex items-center text-xs text-gray-500 cursor-pointer select-none">
                    <input type="checkbox" id="todo-important" class="hidden peer">
                    <i class="fa-regular fa-star text-base text-gray-400 peer-checked:hidden"></i>
                    <i class="fa-solid fa-star text-base text-yellow-400 hidden peer-checked:inline"></i>
                    <span class="ml-1">重要</span>
                </label>
            </div>
            <button type="submit" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg text-sm transition shadow-sm">タスクを追加</button>
        </form>

        <div class="flex gap-2 mb-4 text-xs">
            <button onclick="loadTodos('id')" id="sort-id" class="px-3 py-1.5 rounded-full bg-indigo-600 text-white font-medium">追加順</button>
            <button onclick="loadTodos('due_date')" id="sort-due_date" class="px-3 py-1.5 rounded-full bg-white border text-gray-600 hover:bg-gray-100">⏳ 締め切り順</button>
            <button onclick="loadTodos('important')" id="sort-important" class="px-3 py-1.5 rounded-full bg-white border text-gray-600 hover:bg-gray-100">⭐ 重要度順</button>
        </div>

        <div id="todo-list" class="space-y-2.5">
            </div>
    </div>

    <script>
        let currentSort = 'id';

        // タスク一覧を取得して描画
        async function loadTodos(sortBy = currentSort) {
            currentSort = sortBy;
            
            // ボタンのアクティブ状態の見た目を切り替え
            ['id', 'due_date', 'important'].forEach(type => {
                const btn = document.getElementById(`sort-${type}`);
                if(type === sortBy) {
                    btn.className = "px-3 py-1.5 rounded-full bg-indigo-600 text-white font-medium";
                } else {
                    btn.className = "px-3 py-1.5 rounded-full bg-white border text-gray-600 hover:bg-gray-100";
                }
            });

            const res = await fetch(`/api/todos?sort_by=${sortBy}`);
            const todos = await res.json();
            const listEl = document.getElementById('todo-list');
            listEl.innerHTML = '';

            if (todos.length === 0) {
                listEl.innerHTML = `<div class="text-center text-gray-400 text-sm py-8">タスクはありません</div>`;
                return;
            }

            todos.forEach(todo => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-3.5 bg-white rounded-xl shadow-xs border border-gray-100 transition duration-150 ${todo.is_completed ? 'opacity-50' : ''}`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <input type="checkbox" ${todo.is_completed ? 'checked' : ''} onchange="toggleComplete(${todo.id}, ${todo.is_completed})" class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                        <div class="flex-1 min-w-0">
                            <input type="text" value="${todo.title}" onchange="updateTitle(${todo.id}, this.value)" class="w-full bg-transparent border-b border-transparent hover:border-gray-200 focus:border-indigo-500 focus:outline-none text-sm ${todo.is_completed ? 'line-through text-gray-400' : 'text-gray-700'}" ${todo.is_completed ? 'disabled' : ''}>
                            ${todo.due_date ? `<span class="text-[10px] text-gray-400 block mt-0.5"><i class="fa-regular fa-calendar"></i> ${todo.due_date}</span>` : ''}
                        </div>
                    </div>
                    <button onclick="toggleImportant(${todo.id}, ${todo.is_important})" class="ml-2 p-1 text-lg transition duration-150">
                        <i class="${todo.is_important ? 'fa-solid fa-star text-yellow-400' : 'fa-regular fa-star text-gray-300 hover:text-yellow-400'}"></i>
                    </button>
                `;
                listEl.appendChild(div);
            });
        }

        // 新規タスク追加
        async function addTodo(e) {
            e.preventDefault();
            const title = document.getElementById('todo-title').value;
            const due_date = document.getElementById('todo-date').value || null;
            const is_important = document.getElementById('todo-important').checked;

            await fetch('/api/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, due_date, is_important })
            });

            document.getElementById('todo-form').reset();
            loadTodos();
        }

        // 完了状態の切り替え
        async function toggleComplete(id, currentStatus) {
            await fetch(`/api/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_completed: !currentStatus })
            });
            loadTodos();
        }

        // 星マーク（重要）の切り替え
        async function toggleImportant(id, currentStatus) {
            await fetch(`/api/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_important: !currentStatus })
            });
            loadTodos();
        }

        // タイトルの直接インライン修正
        async function updateTitle(id, newTitle) {
            if(!newTitle.strip) {
                await fetch(`/api/todos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle })
                });
                loadTodos();
            }
        }

        // 完了済みの一括削除
        async function deleteCompleted() {
            if(confirm("完了したタスクをすべて削除しますか？")) {
                await fetch('/api/todos/completed', { method: 'DELETE' });
                loadTodos();
            }
        }

        // 起動時にロード
        loadTodos();
    </script>
</body>
</html>
